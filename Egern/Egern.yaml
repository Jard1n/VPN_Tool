# 仅虚拟网接口模式
vif_only: true
# 是否启用 IPv6
ipv6: false
# HTTP 代理端口号。默认值是 3080
http_port: 3080
# SOCKS 代理端口号。默认值是 3090
socks_port: 3090
# 允许外部连接通过 Wi-Fi 访问设备上的代理
allow_external_connections: true
# 全局阻止 QUIC 协议
# 优先级：代理 > 策略组 > 全局。代理自身的 block_quic 优先级最高
block_quic: false
# 隐藏 VPN 图标
hide_vpn_icon: false
# 劫持 DNS 的地址列表
hijack_dns:
- '*:53'
# 指定自定义的 GeoIP 数据库 URL
geoip_db_url: https://raw.githubusercontent.com/Jard1n/GeoIP/release/Private-GeoIP-CN.mmdb
# 指定自定义的 ASN 数据库 URL
asn_db_url: null
# 代理延迟测试 URL
proxy_latency_test_url: http://www.google.com/blank.html
# 直连延迟测试 URL
direct_latency_test_url: http://connectivitycheck.platform.hicloud.com/generate_204
# 兼容路由模式
compat_route: false
# 包含所有网络流量
include_all_networks: false
# 包含 APNs 流量
include_apns: false
# 包含蜂窝网络服务流量
include_cellular_services: false
# 包含本地网络流量
include_local_networks: false

