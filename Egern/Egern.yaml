  - 192.168.0.1/32

# 虚拟接口排除的路由
vif_excluded_routes:
  - 192.168.0.1/32



dns:
  # DNS 引导器：用于解析上游DNS(DoT、DoH、DoQ)
  bootstrap:
    - system
  # DNS 服务器组
  upstreams:
    ChinaDNS:
    - 223.5.5.5
    - 119.29.29.29
  upstreams:
    Google:
      - https://8.8.8.8/dns-query
      - https://8.8.4.4/dns-query

  # DNS 转发规则
  forward:
    - domain_suffix:
        match: "cn"
        value: bootstrap
    - wildcard:
        match: '*.cn'
        value: bootstrap
    - proxy_rule_set:
        match: https://github.com/ACL4SSR/ACL4SSR/raw/master/Clash/ChinaDomain.list
        value: bootstrap
    - regex:
        match: ^ad\..*|^ads\..*
        value: reject
    - wildcard:
        match: '*'
        value: google
  # 主机映射
  hosts:
    example.com: www.example.com
    localhost: 127.0.0.1
    "*.local": 192.168.1.1
  # 屏蔽IP
  block_ips:
    - 1.2.3.4
    - 4.3.2.1/32
  # 公网IP查询地址
  public_ip_lookup_url: https://ifconfig.me/ip
